<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1200 700" preserveAspectRatio="none">
  <foreignObject x="0" y="0" width="100%" height="100%">
    <body xmlns="http://www.w3.org/1999/xhtml" style="margin:0;width:100vw;height:100vh;overflow:hidden;background:#0f172a;">
      <style>
        html, body { width:100%; height:100%; margin:0; }
        #frame { width:100%; height:100%; border:0; display:block; background:#0f172a; }
        #fallback {
          position: fixed;
          inset: 0;
          display: none;
          place-items: center;
          color: #e2e8f0;
          font: 600 18px/1.4 Segoe UI, Arial, sans-serif;
          background: linear-gradient(135deg, #0f172a, #1e293b, #3b0764);
          text-align: center;
          padding: 24px;
        }
        #fallback a { color: #22d3ee; text-decoration: none; font-weight: 700; }
        #fallback a:hover { text-decoration: underline; }
      </style>

      <iframe id="frame" src="https://watchbilm.org" referrerpolicy="strict-origin-when-cross-origin"></iframe>

      <div id="fallback">
        <div>
          <div style="margin-bottom:12px;">Bilm loaded via jsDelivr wrapper.</div>
          <a href="https://watchbilm.org" target="_top" rel="noopener noreferrer">Open watchbilm.org</a>
        </div>
      </div>

      <script><![CDATA[
        (function () {
          const frame = document.getElementById('frame');
          const fallback = document.getElementById('fallback');
          if (!frame || !fallback) return;

          let loaded = false;
          frame.addEventListener('load', function () {
            loaded = true;
          });

          window.setTimeout(function () {
            if (loaded) return;
            fallback.style.display = 'grid';
          }, 4500);
        })();
      ]]></script>
    </body>
  </foreignObject>
</svg>
