<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm - Games Removed</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <script src="../shared/theme.js"></script>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Poppins', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .removed-card {
      width: min(560px, 100%);
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-md);
      text-align: center;
      display: grid;
      gap: 12px;
    }

    .removed-card h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.1rem);
    }

    .removed-card p {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .removed-card a {
      justify-self: center;
      margin-top: 8px;
      text-decoration: none;
      color: var(--text-inverse);
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="removed-card" role="main">
    <h1>Games Removed</h1>
    <p>The game player has been retired from Bilm. Use the button below to go back to Home.</p>
    <a id="goHomeLink" href="../home/">Go to Home</a>
  </main>
  <script>
    (function assignHomeHref() {
      function detectBasePath() {
        const appRoots = new Set(['home', 'movies', 'tv', 'search', 'settings', 'random', 'test', 'shared', 'games', 'index.html']);
        const parts = window.location.pathname.split('/').filter(Boolean);
        if (!parts.length) return '';
        const appRootIndex = parts.findIndex((part) => appRoots.has(part));
        if (appRootIndex > 0) return `/${parts.slice(0, appRootIndex).join('/')}`;
        return '';
      }

      const link = document.getElementById('goHomeLink');
      if (!link) return;
      link.setAttribute('href', `${detectBasePath()}/home/`);
    })();
  </script>
</body>
</html>
